services:
  mysql:
    image: mysql:8.4
    container_name: smash

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smash_db
      MYSQL_USER: golver
      MYSQL_PASSWORD: smash123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: